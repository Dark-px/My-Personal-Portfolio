  <rect width="768" height="768" fill="url(#bg)"/>

  <text x="384" y="368" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" letter-spacing="2" fill="#F2F2F2" filter="url(#shadow)">
    COMING SOON
  </text>

  <g transform="translate(0 510) scale(1 -1)">
    <text x="384" y="0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" letter-spacing="2" fill="#FFFFFF" fill-opacity="0.18">
      COMING SOON
    </text>
    <rect x="0" y="-130" width="768" height="150" fill="url(#fade)"/>
  </g>

  <ellipse cx="384" cy="492" rx="232" ry="10" fill="#6F6F6F" fill-opacity="0.5"/>
