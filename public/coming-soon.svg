<svg width="768" height="768" viewBox="0 0 768 768" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coming soon">
  <defs>
    <linearGradient id="bg" x1="384" y1="0" x2="384" y2="768" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9A9A9A"/>
      <stop offset="0.5" stop-color="#A8A8A8"/>
      <stop offset="1" stop-color="#8F8F8F"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
